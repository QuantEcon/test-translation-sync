# Auto-generated by `translate setup`
# Place this file in the SOURCE repository: .github/workflows/sync-translations.yml
name: Sync Translations

on:
  pull_request:
    types: [closed]
    paths:
      - '**/*.md'
      - '_toc.yml'

jobs:
  sync:
    if: github.event.pull_request.merged == true
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - uses: QuantEcon/action-translation@v0.9.0
        with:
          mode: sync
          target-repo: QuantEcon/test-translation-sync.fa
          target-language: fa
          docs-folder: .
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          github-token: ${{ secrets.QUANTECON_SERVICES_PAT }}
